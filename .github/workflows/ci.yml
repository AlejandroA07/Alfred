name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# One run per branch/PR; superseded runs are cancelled to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # default for all jobs — backend widens only for the PR coverage comment

jobs:
  backend:
    name: Backend (build, format, tests, coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      pull-requests: write # sticky coverage comment on PRs
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Format gate
        run: |
          dotnet format whitespace --verify-no-changes --no-restore
          dotnet format style --verify-no-changes --severity info --no-restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults --collect:"XPlat Code Coverage"

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool --version 5.5.10

      - name: Merge coverage reports
        run: reportgenerator -reports:"TestResults/**/coverage.cobertura.xml" -targetdir:"CoverageReport" -reporttypes:Cobertura

      - name: Upload test results and coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-and-coverage
          path: |
            TestResults/**/*.trx
            CoverageReport/Cobertura.xml

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        with:
          filename: CoverageReport/Cobertura.xml
          badge: true
          fail_below_min: false
          format: markdown
          hide_complexity: true
          indicators: true
          output: both
          thresholds: '60 80'

      - name: Add coverage to job summary
        run: cat code-coverage-results.md >> $GITHUB_STEP_SUMMARY

      - name: Comment coverage on PR
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  frontend:
    name: Frontend (lint, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

  vulnerable-packages:
    name: Vulnerable-package gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Check for vulnerable packages
        run: |
          dotnet list package --vulnerable --include-transitive --format json --output-version 1 > vuln.json
          count=$(python3 - <<'PY'
          import json
          d = json.load(open('vuln.json'))
          print(sum(
              len(pkg.get('vulnerabilities') or [])
              for proj in d.get('projects', [])
              for fw in proj.get('frameworks') or []
              for key in ('topLevelPackages', 'transitivePackages')
              for pkg in fw.get(key) or []
          ))
          PY
          )
          echo "vulnerabilities found: $count"
          if [ "$count" -gt 0 ]; then
            cat vuln.json
            echo "Vulnerable packages detected — failing build."
            exit 1
          fi

  secret-scan:
    name: Secret scan (full history)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for scan)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
