services:
  db:
    image: postgres:17-alpine
    container_name: alfred-db
    environment:
      POSTGRES_DB: alfred
      POSTGRES_USER: alfred
      # Local development only — the deployed environment injects its own credentials.
      POSTGRES_PASSWORD: alfred_dev_only
    ports:
      - "5432:5432"
    volumes:
      - alfred-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alfred -d alfred"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  alfred-pgdata:
